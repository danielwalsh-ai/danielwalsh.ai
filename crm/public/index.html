<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline | danielwalsh.ai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --canvas:#07070F; --panel:#12163A; --panel-2:#171C46;
    --amber:#F0A030; --white:#FFF; --grey:#9AA0B5; --muted:#5B6078;
    --blue:#3A5BD0; --green:#94C21F;
    --line:rgba(255,255,255,.07); --line-2:rgba(255,255,255,.12);
    --display:'Space Grotesk',system-ui,sans-serif; --body:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--canvas);color:var(--grey);font-family:var(--body);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:inherit;font-size:14px}
  :focus-visible{outline:2px solid var(--amber);outline-offset:2px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

  /* ---------- sign in ---------- */
  .gate{height:100%;display:flex;align-items:center;justify-content:center;padding:24px}
  .gate-card{width:100%;max-width:340px}
  .mono{width:44px;height:44px;border:1.5px solid var(--amber);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:700;color:var(--amber);margin-bottom:20px}
  .gate h1{font-family:var(--display);color:var(--white);font-size:20px;font-weight:600;margin-bottom:4px}
  .gate p{color:var(--muted);font-size:13px;margin-bottom:20px}
  .field{margin-bottom:12px}
  input[type=password],input[type=text],input[type=email]{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--white);padding:11px 13px;border-radius:9px;outline:none}
  input:focus{border-color:var(--amber)}
  .btn{background:var(--amber);color:#07070F;font-family:var(--display);font-weight:600;padding:11px 18px;border-radius:9px;width:100%;transition:filter .15s}
  .btn:hover{filter:brightness(1.08)}
  .btn:disabled{opacity:.5;cursor:default}
  .err{color:var(--amber);font-size:13px;margin-top:10px;min-height:18px}

  /* ---------- shell ---------- */
  .app{display:none;height:100%;grid-template-columns:340px 1fr}
  .app.on{display:grid}

  aside{border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0;background:var(--canvas)}
  .brand{display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--line)}
  .brand .m{width:30px;height:30px;border:1.5px solid var(--amber);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:700;font-size:13px;color:var(--amber)}
  .brand h1{font-family:var(--display);color:var(--white);font-size:15px;font-weight:600}
  .brand .sp{margin-left:auto}
  .lnk{font-size:12px;color:var(--muted)}
  .lnk:hover{color:var(--grey)}

  .search{padding:12px 14px;border-bottom:1px solid var(--line)}
  .search input{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--white);padding:9px 12px;border-radius:8px;outline:none}

  .list{overflow-y:auto;flex:1;min-height:0;padding-bottom:24px}
  .group{padding:16px 18px 6px;font-family:var(--display);font-size:11px;letter-spacing:1.1px;text-transform:uppercase;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:8px}
  .group .n{color:var(--muted);font-family:var(--body);letter-spacing:0;font-size:11px}
  .row{width:100%;text-align:left;padding:11px 18px;border-left:2px solid transparent;display:block;transition:background .12s}
  .row:hover{background:var(--panel)}
  .row.sel{background:var(--panel);border-left-color:var(--amber)}
  .row .nm{color:var(--white);font-weight:500;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .sub{font-size:12px;color:var(--muted);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .empty{padding:40px 18px;color:var(--muted);font-size:13px}

  main{overflow-y:auto;min-height:0;padding:26px 30px 60px;max-width:820px}
  .back{display:none;font-size:13px;color:var(--amber);margin-bottom:14px}

  .head{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:6px}
  .head h2{font-family:var(--display);color:var(--white);font-size:24px;font-weight:600;letter-spacing:-.3px}
  .pill{font-size:11px;font-weight:600;padding:4px 9px;border-radius:20px;background:var(--panel-2);color:var(--grey);font-family:var(--display);letter-spacing:.4px}
  .meta{color:var(--muted);font-size:13px;margin-bottom:26px}
  .meta a{color:var(--grey);text-decoration:none;border-bottom:1px solid var(--line-2)}

  section{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px 22px;margin-bottom:18px}
  .eyebrow{font-family:var(--display);font-size:11px;letter-spacing:1.1px;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:16px}

  .figs{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
  .fig .k{font-size:11px;color:var(--muted);margin-bottom:3px}
  .fig .v{font-family:var(--display);color:var(--white);font-size:19px;font-weight:600}

  /* signature: the lever bar */
  .lever{margin-top:4px}
  .lever-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .lever-lbl{width:74px;flex:0 0 74px;font-size:11px;color:var(--muted);text-align:right}
  .track{flex:1;height:26px;background:rgba(255,255,255,.04);border-radius:5px;position:relative;overflow:hidden}
  .fill{height:100%;border-radius:5px;display:flex;align-items:center;padding:0 10px;font-family:var(--display);font-size:12px;font-weight:600;color:var(--white);white-space:nowrap;transition:width .35s ease}
  .fill.m{background:linear-gradient(90deg,rgba(240,160,48,.85),rgba(240,160,48,.35));color:#07070F}
  .fill.v{background:linear-gradient(90deg,rgba(58,91,208,.85),rgba(58,91,208,.3))}
  .verdict{font-size:13px;color:var(--grey);margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}
  .verdict b{color:var(--amber);font-weight:600}

  label.lb{display:block;font-size:12px;color:var(--grey);margin-bottom:7px;font-weight:500}
  textarea{width:100%;min-height:190px;background:var(--canvas);border:1px solid var(--line);color:var(--white);padding:13px 15px;border-radius:10px;outline:none;resize:vertical;line-height:1.6}
  textarea:focus{border-color:var(--amber)}
  .composer-foot{display:flex;align-items:center;gap:12px;margin-top:14px;flex-wrap:wrap}
  .btn-inline{background:var(--amber);color:#07070F;font-family:var(--display);font-weight:600;padding:10px 18px;border-radius:9px;width:auto}
  .btn-ghost{border:1px solid var(--line-2);color:var(--grey);padding:10px 16px;border-radius:9px;font-size:13px}
  .btn-ghost:hover{color:var(--white);border-color:var(--grey)}
  .status-msg{font-size:13px;color:var(--muted)}
  .status-msg.ok{color:var(--green)}
  .status-msg.bad{color:var(--amber)}

  .log{list-style:none}
  .log li{padding:11px 0;border-bottom:1px solid var(--line);display:flex;gap:12px;align-items:baseline}
  .log li:last-child{border-bottom:none}
  .log .t{font-family:var(--display);font-size:12px;color:var(--white);font-weight:600;min-width:96px}
  .log .d{font-size:12px;color:var(--muted);margin-left:auto;white-space:nowrap}
  .none{color:var(--muted);font-size:13px}

  .placeholder{display:flex;align-items:center;justify-content:center;height:70vh;color:var(--muted);font-size:14px;text-align:center;padding:0 24px}

  @media(max-width:860px){
    .app.on{grid-template-columns:1fr}
    aside{display:flex}
    main{display:none;padding:20px 18px 50px}
    .app.detail aside{display:none}
    .app.detail main{display:block}
    .back{display:inline-block}
    .figs{grid-template-columns:repeat(2,1fr)}
  }
</style>
</head>
<body>

<div class="gate" id="gate">
  <div class="gate-card">
    <div class="mono">DW</div>
    <h1>Pipeline</h1>
    <p>Sign in to see your leads.</p>
    <div class="field"><input type="password" id="pw" placeholder="Password" autocomplete="current-password"></div>
    <button class="btn" id="signin">Sign in</button>
    <div class="err" id="gateErr"></div>
  </div>
</div>

<div class="app" id="app">
  <aside>
    <div class="brand">
      <div class="m">DW</div>
      <h1>Pipeline</h1>
      <span class="sp"></span>
      <button class="lnk" id="refresh">Refresh</button>
      <button class="lnk" id="signout" style="margin-left:10px">Sign out</button>
    </div>
    <div class="search"><input type="text" id="q" placeholder="Search name, company, email"></div>
    <div class="list" id="list"></div>
  </aside>
  <main id="main">
    <div class="placeholder" id="ph">Select a lead to see their numbers and write to them.</div>
    <div id="detail" style="display:none"></div>
  </main>
</div>

<script>
const $ = id => document.getElementById(id);
const gbp = n => (n||n===0) ? '£' + Math.round(n).toLocaleString('en-GB') : '—';
const pc = (n,d=1) => (n||n===0) ? (Math.round(n*10**d)/10**d).toLocaleString('en-GB') + '%' : '—';
const esc = s => String(s??'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const ORDER = ['New','Enriched','Contacted','Replied','Qualified','Won','Lost','Unsubscribed'];

let leads = [], outreach = [], selected = null, dirty = false;

/* ---------- auth ---------- */
async function signIn(){
  const btn = $('signin'), err = $('gateErr');
  err.textContent = ''; btn.disabled = true; btn.textContent = 'Signing in…';
  try{
    const r = await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:$('pw').value})});
    const d = await r.json();
    if(!r.ok) throw new Error(d.error || 'Could not sign in.');
    start();
  }catch(e){ err.textContent = e.message; }
  finally{ btn.disabled = false; btn.textContent = 'Sign in'; }
}
$('signin').addEventListener('click', signIn);
$('pw').addEventListener('keydown', e => { if(e.key==='Enter') signIn(); });
$('signout').addEventListener('click', async () => { await fetch('/api/logout',{method:'POST'}); location.reload(); });

/* ---------- data ---------- */
async function load(){
  const [a,b] = await Promise.all([fetch('/api/leads'), fetch('/api/outreach')]);
  if(a.status===401){ location.reload(); return; }
  leads = (await a.json()).records || [];
  outreach = b.ok ? ((await b.json()).records || []) : [];
  renderList();
  if(selected){ const s = leads.find(l=>l.id===selected.id); if(s){ selected = s; renderDetail(); } }
}
async function start(){
  $('gate').style.display='none';
  $('app').classList.add('on');
  await load();
}

/* ---------- list ---------- */
function renderList(){
  const q = $('q').value.trim().toLowerCase();
  const shown = leads.filter(l => {
    if(!q) return true;
    const f = l.fields||{};
    return [f.Name,f.Company,f.Email].some(v => String(v||'').toLowerCase().includes(q));
  });

  if(!shown.length){
    $('list').innerHTML = `<div class="empty">${leads.length ? 'No leads match that search.' : 'No leads yet. They will appear here the moment someone submits the margin tool.'}</div>`;
    return;
  }

  const groups = {};
  for(const l of shown){ const s = l.fields?.Status || 'New'; (groups[s] ||= []).push(l); }
  const keys = Object.keys(groups).sort((a,b)=>{
    const ia = ORDER.indexOf(a), ib = ORDER.indexOf(b);
    return (ia<0?99:ia) - (ib<0?99:ib);
  });

  $('list').innerHTML = keys.map(k => `
    <div class="group">${esc(k)} <span class="n">${groups[k].length}</span></div>
    ${groups[k].map(l => {
      const f = l.fields||{};
      const sub = [f.Company, f.Email].filter(Boolean).join(' · ') || 'No contact details';
      return `<button class="row ${selected&&selected.id===l.id?'sel':''}" data-id="${l.id}">
        <span class="nm">${esc(f.Name || f.Email || 'Unnamed lead')}</span>
        <span class="sub">${esc(sub)}</span>
      </button>`;
    }).join('')}
  `).join('');

  document.querySelectorAll('.row').forEach(r => r.addEventListener('click', () => select(r.dataset.id)));
}
$('q').addEventListener('input', renderList);
$('refresh').addEventListener('click', load);

function select(id){
  if(dirty && !confirm('You have an unsaved draft. Leave it?')) return;
  dirty = false;
  selected = leads.find(l => l.id === id) || null;
  $('app').classList.add('detail');
  renderList(); renderDetail();
}

/* ---------- detail ---------- */
function renderDetail(){
  if(!selected){ $('ph').style.display='flex'; $('detail').style.display='none'; return; }
  $('ph').style.display='none';
  const d = $('detail'); d.style.display='block';
  const f = selected.fields || {};

  const turnover = f['Monthly Turnover'], margin = f['Current Margin (%)'], target = f['Target Profit'];
  const marginNeeded = f['Margin Needed (%)'], volNeeded = f['Turnover Needed'], uplift = f['Volume Uplift (%)'];
  const hasNumbers = [turnover, margin, target].every(v => v || v === 0);

  const pointsAdded = (marginNeeded || marginNeeded===0) && (margin || margin===0) ? marginNeeded - margin : null;
  // Scale both bars against the volume route, which is always the longer of the two.
  const upliftPct = uplift || 0;
  const marginShare = pointsAdded && upliftPct ? Math.max(8, Math.min(100, (pointsAdded / upliftPct) * 100)) : 8;

  const log = outreach
    .filter(o => (o.fields?.Summary || '').includes(f.Email || '\u0000'))
    .sort((a,b) => (b.createdTime||'').localeCompare(a.createdTime||''));

  d.innerHTML = `
    <button class="back" id="back">← All leads</button>

    <div class="head">
      <h2>${esc(f.Name || f.Email || 'Unnamed lead')}</h2>
      <span class="pill">${esc(f.Status || 'New')}</span>
    </div>
    <div class="meta">
      ${f.Company ? esc(f.Company) + ' · ' : ''}
      ${f.Email ? `<a href="mailto:${esc(f.Email)}">${esc(f.Email)}</a>` : 'No email on file'}
      ${f['Last Contacted'] ? ' · last written to ' + esc(new Date(f['Last Contacted']).toLocaleDateString('en-GB')) : ''}
    </div>

    ${hasNumbers ? `
    <section>
      <div class="eyebrow">Their numbers</div>
      <div class="figs">
        <div class="fig"><div class="k">Monthly turnover</div><div class="v">${gbp(turnover)}</div></div>
        <div class="fig"><div class="k">Current margin</div><div class="v">${pc(margin)}</div></div>
        <div class="fig"><div class="k">Profit target</div><div class="v">${gbp(target)}</div></div>
        <div class="fig"><div class="k">Making now</div><div class="v">${gbp(f['Current Profit'])}</div></div>
      </div>

      <div class="lever">
        <div class="lever-row">
          <div class="lever-lbl">Margin route</div>
          <div class="track"><div class="fill m" style="width:${marginShare}%">${pointsAdded!==null ? '+' + pc(pointsAdded) + ' points' : '—'}</div></div>
        </div>
        <div class="lever-row">
          <div class="lever-lbl">Volume route</div>
          <div class="track"><div class="fill v" style="width:100%">+${pc(upliftPct,0)} turnover, to ${gbp(volNeeded)}</div></div>
        </div>
        <div class="verdict">
          To reach ${gbp(target)} a month they either lift margin to <b>${pc(marginNeeded)}</b>, or sell <b>${pc(upliftPct,0)}</b> more at the margin they have.
        </div>
      </div>
    </section>` : `
    <section>
      <div class="eyebrow">Their numbers</div>
      <div class="none">No figures on this lead. They were added by hand rather than through the margin tool.</div>
    </section>`}

    <section>
      <div class="eyebrow">Write to them</div>
      <label class="lb" for="draft">This is the email body. It sends from hello@danielwalsh.ai and logs itself.</label>
      <textarea id="draft" placeholder="Hi ${esc((f.Name||'').split(' ')[0] || 'there')},&#10;&#10;">${esc(f.Notes || '')}</textarea>
      <div class="composer-foot">
        <button class="btn btn-inline" id="send">Queue send</button>
        <button class="btn-ghost" id="saveOnly">Save draft</button>
        <span class="status-msg" id="msg"></span>
      </div>
    </section>

    <section>
      <div class="eyebrow">History</div>
      ${log.length ? `<ul class="log">${log.map(o => `
        <li>
          <span class="t">${esc(o.fields?.Type || 'Activity')}</span>
          <span>${esc(o.fields?.Campaign || '')}</span>
          <span class="d">${esc(new Date(o.createdTime).toLocaleString('en-GB',{dateStyle:'short',timeStyle:'short'}))}</span>
        </li>`).join('')}</ul>`
        : `<div class="none">Nothing sent yet.</div>`}
    </section>
  `;

  $('back').addEventListener('click', () => { $('app').classList.remove('detail'); });
  $('draft').addEventListener('input', () => { dirty = true; $('msg').textContent=''; $('msg').className='status-msg'; });
  $('send').addEventListener('click', () => commit(true));
  $('saveOnly').addEventListener('click', () => commit(false));
}

async function commit(queue){
  const msg = $('msg'), body = $('draft').value.trim();
  const f = selected.fields || {};
  msg.className = 'status-msg';

  if(queue){
    if(!body){ msg.textContent = 'Write the email first.'; msg.className='status-msg bad'; return; }
    if(!f.Email){ msg.textContent = 'This lead has no email address.'; msg.className='status-msg bad'; return; }
    if(f.Unsubscribed){ msg.textContent = 'This lead has opted out. Sending is blocked.'; msg.className='status-msg bad'; return; }
  }

  const fields = { Notes: body };
  if(queue){ fields.Status = 'Contacted'; fields['Last Contacted'] = null; }

  msg.textContent = queue ? 'Queueing…' : 'Saving…';
  try{
    const r = await fetch(`/api/leads/${selected.id}`, {
      method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ fields })
    });
    const d = await r.json();
    if(!r.ok) throw new Error(d.error || 'Could not save.');
    dirty = false;
    msg.textContent = queue ? 'Queued. It sends within 15 minutes.' : 'Draft saved.';
    msg.className = 'status-msg ok';
    await load();
  }catch(e){
    msg.textContent = e.message;
    msg.className = 'status-msg bad';
  }
}

window.addEventListener('beforeunload', e => { if(dirty){ e.preventDefault(); e.returnValue=''; } });

/* ---------- boot ---------- */
fetch('/api/session').then(r=>r.json()).then(d => { if(d.signedIn) start(); });
</script>
</body>
</html>
